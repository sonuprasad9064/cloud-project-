name: Pylint
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install Pylint
      run: |
        python -m pip install --upgrade pip
        pip install pylint
    - name: Analysing the code
      run: |
        pylint $(git ls-files '*.py') || true

